{% extends 'base.html' %}
{% block title %}ShopAI - Page Not Found{% endblock %}

{% block content %}
<section class="py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 text-center py-5">
                <div class="mb-4">
                    <i class="bi bi-exclamation-circle text-primary" style="font-size: 6rem;"></i>
                </div>
                <h1 class="display-1 fw-bold text-primary">404</h1>
                <h3 class="fw-bold mb-3">Page Not Found!</h3>
                <p class="text-muted mb-4">
                    Oops! The page you're looking for doesn't exist.
                    It might have been moved or deleted.
                </p>
                <div class="d-flex gap-3 justify-content-center">
                    <a href="/" class="btn btn-primary btn-lg">
                        <i class="bi bi-house me-2"></i>Go Home
                    </a>
                    <a href="/products" class="btn btn-outline-primary btn-lg">
                        <i class="bi bi-grid me-2"></i>Browse Products
                    </a>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
